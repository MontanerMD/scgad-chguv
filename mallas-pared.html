body { min-height: 100vh; min-height: 100dvh; padding-bottom: env(safe-area-inset-bottom); }

/* ---- TABS ---- */
.tabs {

  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px; margin-bottom: 16px;

.tab {
  min-height: var(--tap); padding: 8px 10px;

.tab[aria-selected="true"] {

.disclaimer {

  color: var(--warn-fg); border-radius: var(--radius);
  padding: 10px 12px; font-size: 13px; line-height: 1.4;
  margin-bottom: 16px; display: flex; gap: 8px;
}
.disclaimer strong { font-weight: 600; }
.disclaimer .icn { flex: 0 0 16px; width: 16px; height: 16px; margin-top: 2px; }

.search {

  font-size: 15px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-family: inherit;
}
.search:focus { outline: 2px solid var(--primary); outline-offset: -1px; border-color: transparent; }

.filter-row {

.filter-row .search { margin-bottom: 0; flex: 1; min-width: 180px; }

.cat-select {

.cat-select:focus { outline: 2px solid var(--primary); outline-offset: -1px; border-color: transparent; }

.count-label { font-size: 13px; font-weight: 500; color: var(--text-3); }
.view-toggle {

  border-radius: var(--radius-sm); padding: 3px;

.view-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 4px;

.view-btn[aria-pressed="true"] { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(15,23,42,.06); }

  justify-content: space-between; gap: 12px;
  font-size: 15px; font-weight: 500; color: var(--text);

}
.surgery-btn:hover { border-color: var(--border-strong); }
.surgery-btn:active { background: var(--surface-2); }
.surgery-btn .arrow { color: var(--text-3); font-size: 18px; line-height: 1; }

.back {
  display: inline-flex; align-items: center; gap: 6px;

}
.back .arrow { font-size: 18px; line-height: 1; }

const state = {

const main = document.getElementById('main');

/* ============================================================

============================================================ */
document.querySelectorAll('.tab[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.getAttribute('data-tab');
    state.view = tab;
    if (tab === 'wizard') {
      state.wizardStep = 1; state.wizardAnswers = {}; state.wizardResults = null;
    }
    syncTabs();
    render();
    window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
  });
});

function syncTabs() {
  document.getElementById('tab-wizard').setAttribute('aria-selected',  String(state.view === 'wizard'));
  document.getElementById('tab-catalog').setAttribute('aria-selected', String(state.view === 'catalog'));
  document.getElementById('tab-fuentes').setAttribute('aria-selected', String(state.view === 'fuentes'));
  // Actualizar aria-labelledby del panel para reflejar la tab activa
  const activeTabId = state.view === 'wizard' ? 'tab-wizard' : state.view === 'catalog' ? 'tab-catalog' : 'tab-fuentes';
  main.setAttribute('aria-labelledby', activeTabId);
  document.querySelector('.disclaimer').style.display = state.view === 'fuentes' ? 'none' : '';
}

/* ============================================================

============================================================ */
function render() {
  if (state.view === 'catalog') renderCatalog();
  else if (state.view === 'fuentes') renderFuentes();
  else renderWizard();
}

/* ============================================================
   WIZARD
============================================================ */
function renderWizard() {
  const step = state.wizardStep;
  const ans  = state.wizardAnswers;
  let html   = '<div class="animate">';

  if (step === 'results') {
    html += renderWizardResults();
  } else {
    html += `<p class="view-title">Filtro guiado — seleccione características</p>`;
    html += renderCrumbs();
    html += renderWizardStep();
  }

  html += '</div>';
  main.innerHTML = html;
  bindWizard();
}

function renderCrumbs() {
  const crumbs = state.wizardAnswers._crumbs || [];
  return crumbs.map((c, i) => `
    <div class="algo-crumb" data-crumb="${i}" role="button" tabindex="0" aria-label="Cambiar: ${esc(c.q)}">
      <span>
        <span class="crumb-q">${esc(c.q)}</span>
        &nbsp;→&nbsp;
        <span class="crumb-a">${esc(c.a)}</span>
      </span>
      <span class="crumb-edit" aria-hidden="true">Cambiar</span>
    </div>`).join('');
}

function renderWizardStep() {
  const step = state.wizardStep;
  const ans  = state.wizardAnswers;

  if (step === 1) {
    return stepHtml('1', '¿Qué tipo de defecto se va a tratar?', [
      { label: 'Hernia Inguinal', next: 2 },
      { label: 'Hernia Umbilical / Pequeña Eventración', cats: 'MALLAS HERNIA UMBILICAL O PEQUEÑAS EVENTRACIONES' },
      { label: 'Eventración Compleja', next: 3 },
      { label: 'Estoma / Profilaxis Colorrectal', cats: 'MALLAS COLOSTOMÍA|CIRUGÍA COLORRECTAL' }
    ]);
  }
  if (step === 2 && ans.defecto === 'inguinal') {
    return stepHtml('2', '¿Qué abordaje quirúrgico se empleará?', [
      { label: 'Abierto', sub: 'Lichtenstein, Rutkow, etc.', cats: 'HERNIA INGUINAL MALLAS REPARACIÓN|PACK REPARACIÓN HERNIA INGUINAL|OTRAS MALLAS REPARACIÓN HERNIA INGUINAL' },
      { label: 'Laparoscópico', sub: 'TEP / TAPP', cats: 'MALLAS SINTETICAS HERNIA INGUINAL LAPAROSCOPIA' }

  if (step === 3 && ans.defecto === 'eventracion') {

      { label: 'Sí (Intraperitoneal)', sub: 'IPOM u otra técnica con lecho expuesto', next: 4 }
    ]);
  }
  if (step === 4) {
    return stepHtml('3', '¿Qué tipo de material se requiere?', [
      { label: 'Sintética con barrera adherencial', sub: 'Doble cara, recubiertas, ePTFE', cats: 'MALLAS INTRAPERITONEALES ABIERTA|MALLA INTRAPERITONEAL ABIERTA O LAPAROSCOPICA|MALLAS INTRA Y EXTRA PERITONEALES (ABIERTA O LAP*)' },

    ]);
  }
  return '';

function stepHtml(num, pregunta, opciones) {
  const opts = opciones.map((o, i) => `
    <button class="algo-opt" data-opt-idx="${i}" type="button">

        <span>${esc(o.label)}</span>
        ${o.sub ? `<span class="opt-sub">${esc(o.sub)}</span>` : ''}
      </span>
      <span class="opt-arrow" aria-hidden="true">›</span>
    </button>`).join('');
  const optData = JSON.stringify(opciones.map(o => ({ label: o.label, next: o.next, cats: o.cats })));
  return `
    <div class="algo-step" data-step-q="${esc(pregunta)}" data-step-opts='${optData.replace(/'/g,"&#39;")}'>
      <span class="step-num">Paso ${num}</span>
      <div class="step-q">${esc(pregunta)}</div>
      <div class="algo-opts">${opts}</div>
    </div>`;
}

function bindWizard() {
  // Breadcrumbs
  main.querySelectorAll('.algo-crumb[data-crumb]').forEach(el => {
    const handler = () => {
      const idx = parseInt(el.getAttribute('data-crumb'), 10);
      const crumbs = (state.wizardAnswers._crumbs || []).slice(0, idx);
      state.wizardAnswers = { ...rebuildAnswersFromCrumbs(crumbs), _crumbs: crumbs };
      state.wizardStep = crumbs.length === 0 ? 1 : resolveStepFromCrumbs(crumbs);
      state.wizardResults = null;
      renderWizard();
    };
    el.addEventListener('click', handler);
    el.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); handler(); } });
  });

  // Opciones de paso
  const stepEl = main.querySelector('.algo-step');
  if (stepEl) {
    const pregunta = stepEl.getAttribute('data-step-q');
    const opciones = JSON.parse(stepEl.getAttribute('data-step-opts').replace(/&#39;/g,"'"));
    main.querySelectorAll('.algo-opt[data-opt-idx]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.getAttribute('data-opt-idx'), 10);
        const opt = opciones[idx];
        const crumbs = state.wizardAnswers._crumbs || [];
        crumbs.push({ q: pregunta, a: opt.label });
        if (state.wizardStep === 1) {
          const map = { 'Hernia Inguinal':'inguinal', 'Hernia Umbilical / Pequeña Eventración':'umbilical', 'Eventración Compleja':'eventracion', 'Estoma / Profilaxis Colorrectal':'colostomia' };
          state.wizardAnswers.defecto = map[opt.label] || opt.label;
        }
        state.wizardAnswers._crumbs = crumbs;

        if (opt.cats) {
          const cats = opt.cats.split('|');
          state.wizardResults = catalogData.filter(i => cats.includes(i.category));
          state.wizardStep = 'results';
        } else {
          state.wizardStep = opt.next;
        }
        renderWizard();
      });
    });
  }

  // Reset
  const resetBtn = main.querySelector('#wiz-reset');
  if (resetBtn) resetBtn.addEventListener('click', () => {
    state.wizardStep = 1; state.wizardAnswers = {}; state.wizardResults = null;
    renderWizard();
  });

  // Toggle vista en resultados wizard
  ['wiz-btn-list','wiz-btn-grid'].forEach(id => {
    const btn = main.querySelector('#'+id);
    if (!btn) return;
    btn.addEventListener('click', () => {
      state.catalogView = id === 'wiz-btn-grid' ? 'grid' : 'list';
      const items = main.querySelector('#wiz-items');
      if (items) items.innerHTML = renderMeshItems(state.wizardResults||[], state.catalogView);
      main.querySelectorAll('#wiz-btn-list,#wiz-btn-grid').forEach(b => {
        b.setAttribute('aria-pressed', String(b.id === (state.catalogView==='list'?'wiz-btn-list':'wiz-btn-grid')));
      });
    });
  });
}

function rebuildAnswersFromCrumbs(crumbs) {
  const ans = {};
  crumbs.forEach((c, i) => {
    if (i === 0) {
      const map = { 'Hernia Inguinal':'inguinal','Hernia Umbilical / Pequeña Eventración':'umbilical','Eventración Compleja':'eventracion','Estoma / Profilaxis Colorrectal':'colostomia' };
      ans.defecto = map[c.a] || c.a;
    }
  });
  return ans;
}

function resolveStepFromCrumbs(crumbs) {
  // Nota: mapa parcial. Cubre los pasos actuales del wizard. Si se añaden pasos futuros,
  // ampliar este mapa para evitar el fallback silencioso a paso 1.
  if (!crumbs.length) return 1;
  const last = crumbs[crumbs.length-1];
  const map = { 'Hernia Inguinal': 2, 'Eventración Compleja': 3, 'Sí (Intraperitoneal)': 4 };
  return map[last.a] || 1;
}

      <div id="cat-items">${itemsHtml}</div>
    </div>`;

  const searchEl = main.querySelector('#cat-search');
  const selectEl = main.querySelector('#cat-select');

  searchEl.addEventListener('input', e => {
    state.searchQuery = e.target.value;
    refreshCatalog();
  });
  selectEl.addEventListener('change', e => {
    state.selectedCategory = e.target.value;
    refreshCatalog();
  });

  ['cat-btn-list','cat-btn-grid'].forEach(id => {
    main.querySelector('#'+id).addEventListener('click', () => {
      state.catalogView = id === 'cat-btn-grid' ? 'grid' : 'list';
      main.querySelectorAll('#cat-btn-list,#cat-btn-grid').forEach(b =>
        b.setAttribute('aria-pressed', String(b.id === (state.catalogView==='list'?'cat-btn-list':'cat-btn-grid')))
      );
      refreshCatalog();
    });
  });
}

function refreshCatalog() {
  const q = state.searchQuery.toLowerCase();
  const filtered = catalogData.filter(item => {
    const ms = !q || item.name.toLowerCase().includes(q) || item.provider.toLowerCase().includes(q) || item.ref.toLowerCase().includes(q);
    const mc = state.selectedCategory === 'All' || item.category === state.selectedCategory;
    return ms && mc;
  });
  const count = main.querySelector('#cat-count');
  if (count) count.textContent = `Mostrando ${filtered.length} referencia${filtered.length!==1?'s':''}`;
  const items = main.querySelector('#cat-items');
  if (items) {
    items.innerHTML = filtered.length > 0
      ? renderMeshItems(filtered, state.catalogView)
      : `<div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <p>No se encontraron resultados. Ajusta los filtros.</p>
         </div>`;
  }
}

/* ============================================================
   PLANTILLAS DE MALLA
============================================================ */
function renderMeshItems(items, view) {
  if (view === 'grid') {
    return `<div class="mesh-grid">${items.map(meshCard).join('')}</div>`;
  }
  return `<div class="mesh-list">${items.map(meshListItem).join('')}</div>`;
}

function meshCard(item) {
  return `
    <div class="mesh-card">
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px;">
          <span class="mesh-tag-provider">${esc(item.provider)}</span>
          <span class="mesh-tag-pact">Pacto ${esc(item.pact)}</span>
        </div>
        <div class="mesh-name">${esc(item.name.toUpperCase())}</div>
        <div class="mesh-cat-label" title="${esc(item.category.toUpperCase())}">${esc(item.category.toUpperCase())}</div>
      </div>
      <div class="mesh-card-data">
        <div class="mesh-card-row">
          <span class="lbl">Tamaño</span>
          <span class="val">${esc(item.size)}</span>
        </div>
        <div class="mesh-card-row">
          <span class="lbl">Referencia</span>
          <span class="val">${esc(item.ref)}</span>
        </div>
      </div>
    </div>`;
}

function meshListItem(item) {
  return `
    <div class="mesh-list-item">
      <div class="mesh-main">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
          <span class="mesh-tag-provider">${esc(item.provider)}</span>
        </div>
        <div class="mesh-name">${esc(item.name.toUpperCase())}</div>
        <div class="mesh-cat-label" title="${esc(item.category.toUpperCase())}">${esc(item.category.toUpperCase())}</div>
      </div>
      <div class="mesh-meta">
        <div class="mesh-field">
          <span class="lbl">Tamaño</span>
          <span class="val">${esc(item.size)}</span>
        </div>
        <div class="mesh-field">
          <span class="lbl">Referencia</span>
          <span class="val">${esc(item.ref)}</span>
        </div>
        <div class="mesh-field mesh-field-divider">
          <span class="lbl">Pacto</span>
          <span class="val">${esc(item.pact)}</span>
        </div>
      </div>
    </div>`;
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
