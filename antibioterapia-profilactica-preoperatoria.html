                            <p className="text-slate-500 font-bold mb-6 text-lg">¿Cuál es el escenario clínico del paciente?</p>
                            
                            <div className="space-y-3.5">
                              {selectedSurgery.scenarios.map((scenario) => (
                                <button
                                  key={scenario.id}
                                  onClick={() => setSelectedScenario(scenario)}
                                  className="w-full text-left bg-slate-50/80 border border-slate-200/80 p-5 md:p-6 rounded-3xl hover:bg-white hover:border-indigo-400 hover:shadow-xl hover:shadow-indigo-500/10 transition-all flex items-center justify-between group"
                                >
                                  <span className="font-bold text-slate-700 group-hover:text-indigo-800 text-lg md:text-xl">{scenario.name}</span>
                                  <div className="bg-white group-hover:bg-indigo-50 p-2.5 rounded-full shadow-sm border border-slate-100 group-hover:border-indigo-200 transition-all shrink-0 ml-4">
                                    <iconify-icon icon="lucide:chevron-right" class="text-2xl text-slate-400 group-hover:text-indigo-600"></iconify-icon>
                                  </div>
                                </button>
                              ))}
                            </div>
                          </div>

                          <RiskFactorsCard />
                        </div>
                      ) : (
                        <div className="max-w-3xl mx-auto">
                          <div className="flex flex-wrap items-center gap-3 mb-8">
                            <button 
                              onClick={() => setSelectedScenario(null)}
                              className="text-sm text-indigo-600 hover:text-indigo-800 flex items-center gap-2 font-bold bg-indigo-50 hover:bg-indigo-100 px-5 py-2.5 rounded-full transition-all shadow-sm"
                            >
                              <iconify-icon icon="lucide:arrow-left" class="text-base"></iconify-icon> Escenarios
                            </button>
                            <button 
                              onClick={resetAlgorithm}
                              className="text-sm text-slate-500 hover:text-slate-700 font-bold bg-white border border-slate-200 px-5 py-2.5 rounded-full transition-all shadow-sm hidden sm:block"
                            >
                              Inicio
                            </button>
                          </div>

                          <div className="bg-white rounded-[2.5rem] border border-slate-200/60 shadow-2xl shadow-slate-200/50 overflow-hidden relative">
                            <div className={`absolute top-0 left-0 w-full h-3 bg-gradient-to-r ${selectedSurgery.color}`} />
                            
                            <div className="p-6 md:p-10 border-b border-slate-100/80">
                              <div className="flex flex-wrap items-center gap-3 mb-5">
                                <div className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-black ${selectedSurgery.bgLight} ${selectedSurgery.textDark} border border-white/50 shadow-sm`}>
                                  <iconify-icon icon={selectedSurgery.icon} class="text-base"></iconify-icon>
                                  {selectedSurgery.category}
                                </div>
                                <span className="text-slate-300 font-bold">/</span>
                                <div className="bg-slate-100 text-slate-700 px-4 py-2 rounded-full text-sm font-bold shadow-inner">
                                  {selectedScenario.name}
                                </div>
                              </div>
                              <h2 className="text-4xl md:text-5xl font-extrabold text-slate-800 tracking-tight">Recomendación</h2>
                            </div>

                            <div className="p-6 md:p-10 bg-slate-50/30">
                              <div className={`relative overflow-hidden flex flex-col sm:flex-row sm:items-center justify-between gap-6 p-6 md:p-8 rounded-[2rem] mb-8 border transition-all duration-500 ${isAllergic ? 'bg-red-50/80 border-red-200 shadow-inner' : 'bg-white border-slate-200 shadow-md'}`}>
                                {isAllergic && <div className="absolute top-0 left-0 w-1.5 h-full bg-red-500" />}
                                <div className="flex items-center gap-5">
                                  <div className={`p-4 rounded-2xl transition-colors shadow-sm ${isAllergic ? 'bg-red-100' : 'bg-slate-100'}`}>
                                    <iconify-icon icon="lucide:shield-alert" class={`text-[2rem] ${isAllergic ? 'text-red-600' : 'text-slate-500'}`}></iconify-icon>
                                  </div>
                                  <div>
                                    <span className="font-extrabold block text-slate-800 text-xl">Alergia a betalactámicos</span>
                                    <span className={`text-sm font-bold mt-1 block ${isAllergic ? 'text-red-600/80' : 'text-slate-500'}`}>
                                      {isAllergic ? 'Protocolo alternativo activado' : 'Ajustar si el paciente es alérgico'}
                                    </span>
                                  </div>
                                </div>
                                <label className="relative inline-flex items-center cursor-pointer self-start sm:self-auto">
                                  <input 
                                    type="checkbox" 
                                    className="sr-only peer"
                                    checked={isAllergic}
                                    onChange={() => setIsAllergic(!isAllergic)}
                                  />
                                  <div className="w-16 h-9 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-[1.75rem] peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-7 after:w-7 after:transition-all peer-checked:bg-red-500 shadow-inner"></div>
                                </label>
                              </div>

                              <div className={`p-8 md:p-10 rounded-[2rem] border-2 shadow-xl transition-all duration-500 relative overflow-hidden ${
                                (isAllergic ? selectedScenario.alg : selectedScenario.std) === 'Sin profilaxis' 
                                  ? 'bg-gradient-to-br from-emerald-50 via-emerald-100/50 to-green-50 border-emerald-300' 
                                  : isAllergic 
                                    ? 'bg-gradient-to-br from-red-50 via-red-100/50 to-rose-50 border-red-300'
                                    : 'bg-gradient-to-br from-blue-50 via-blue-100/50 to-indigo-50 border-blue-300'
                              }`}>
                                
                                <div className="absolute -bottom-6 -right-6 opacity-[0.05] pointer-events-none">
                                  <iconify-icon icon="lucide:stethoscope" class="text-[12rem]"></iconify-icon>
                                </div>

                                <h3 className="text-sm font-black uppercase tracking-widest text-slate-500 mb-5 flex items-center gap-2.5">
                                  <iconify-icon icon="lucide:syringe" class="text-xl"></iconify-icon> Pauta a administrar
                                </h3>
                                
                                <div className="text-2xl md:text-4xl font-black text-slate-800 whitespace-pre-line leading-tight relative z-10">
                                  {(isAllergic ? selectedScenario.alg : selectedScenario.std) === 'Sin profilaxis' ? (
                                    <span className="flex items-center gap-3 text-emerald-700">
                                      <iconify-icon icon="lucide:check-circle-2" class="text-[2.5rem] shrink-0"></iconify-icon> No indicada
                                    </span>
                                  ) : (
                                    <span className={isAllergic ? 'text-red-900' : 'text-blue-900'}>
                                      {isAllergic ? selectedScenario.alg : selectedScenario.std}
                                    </span>
                                  )}
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {activeTab === 'guide' && (
                    <div className="space-y-8">
                      <div className="mb-8">
                        <h2 className="text-3xl md:text-4xl font-extrabold text-slate-800 tracking-tight">Guía Clínica Completa</h2>
                        <p className="text-slate-500 font-medium md:text-lg mt-2">Visión general estructurada de todas las indicaciones y pautas.</p>
                      </div>

                      <RiskFactorsCard />

                      <div className="grid gap-8">
                        {data.map((surgery) => (
                          <div key={surgery.id} className="bg-white rounded-[2rem] border border-slate-200/80 shadow-lg overflow-hidden">
                            <div className={`px-6 py-5 border-b border-slate-100 flex items-center gap-4 bg-gradient-to-r from-slate-50 to-white`}>
                              <div className={`p-3 rounded-2xl bg-gradient-to-br ${surgery.color} text-white shadow-md`}>
                                <iconify-icon icon={surgery.icon} class="text-2xl"></iconify-icon>
                              </div>
                              <h3 className="font-extrabold text-slate-800 text-xl md:text-2xl">{surgery.category}</h3>
                            </div>
                            <div className="overflow-x-auto">
                              <table className="w-full text-left border-collapse min-w-[600px]">
                                <thead>
                                  <tr className="bg-slate-50/50 text-slate-500 text-xs md:text-sm font-black uppercase tracking-wider">
                                    <th className="p-5 border-b border-slate-200/60 w-1/3">Escenario / Indicación</th>
                                    <th className="p-5 border-b border-slate-200/60 w-1/3 text-blue-700">Recomendación Estándar</th>
                                    <th className="p-5 border-b border-slate-200/60 w-1/3 text-red-600">Alérgicos Betalactámicos</th>
                                  </tr>
                                </thead>
                                <tbody className="text-sm md:text-base">
                                  {surgery.scenarios.map((scen, idx) => (
                                    <tr key={scen.id} className={`hover:bg-slate-50/80 transition-colors ${idx !== surgery.scenarios.length - 1 ? 'border-b border-slate-100' : ''}`}>
                                      <td className="p-5 font-bold text-slate-700 bg-white/30">{scen.name}</td>
                                      <td className="p-5 text-slate-700 font-medium whitespace-pre-line leading-relaxed">
                                        {scen.std === 'Sin profilaxis' ? <span className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-emerald-50 border border-emerald-100 text-emerald-700 font-bold text-xs uppercase tracking-wide"><iconify-icon icon="lucide:check-circle-2" class="text-base"></iconify-icon> No indicada</span> : scen.std}
                                      </td>
                                      <td className="p-5 text-slate-700 font-medium whitespace-pre-line leading-relaxed">
                                        {scen.alg === 'Sin profilaxis' ? <span className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-emerald-50 border border-emerald-100 text-emerald-700 font-bold text-xs uppercase tracking-wide"><iconify-icon icon="lucide:check-circle-2" class="text-base"></iconify-icon> No indicada</span> : scen.alg}
                                      </td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </main>

              <nav className="md:hidden fixed bottom-6 left-4 right-4 z-40 pointer-events-none">
                <div className="bg-slate-900/90 backdrop-blur-xl border border-white/10 rounded-3xl p-1.5 flex shadow-2xl pointer-events-auto">
                  <button
                    onClick={() => { setActiveTab('algorithm'); window.scrollTo({top:0, behavior:'smooth'}); }}
                    className={`flex-1 flex flex-col items-center justify-center py-3 rounded-2xl gap-1.5 transition-all duration-300 ${
                      activeTab === 'algorithm' ? 'bg-indigo-500 text-white shadow-md' : 'text-slate-400 hover:text-white'
                    }`}
                  >
                    <iconify-icon icon="lucide:layout-grid" class="text-xl"></iconify-icon>
                    <span className="text-[10px] font-black uppercase tracking-widest">Algoritmo</span>
                  </button>
                  <button
                    onClick={() => { setActiveTab('guide'); window.scrollTo({top:0, behavior:'smooth'}); }}
                    className={`flex-1 flex flex-col items-center justify-center py-3 rounded-2xl gap-1.5 transition-all duration-300 ${
                      activeTab === 'guide' ? 'bg-indigo-500 text-white shadow-md' : 'text-slate-400 hover:text-white'
                    }`}
                  >
                    <iconify-icon icon="lucide:book-open" class="text-xl"></iconify-icon>
                    <span className="text-[10px] font-black uppercase tracking-widest">Guía</span>
                  </button>
                </div>
              </nav>

              <footer className="bg-slate-950 text-slate-400 py-12 mt-auto border-t-4 border-indigo-600 relative z-10 pb-32 md:pb-12">
                <div className="max-w-6xl mx-auto px-4 text-sm md:text-base space-y-6">
                  <div className="flex flex-col md:flex-row justify-between gap-8 pb-8 border-b border-slate-800/80">
                    <div className="space-y-2">
                      <p className="font-black text-white text-xl tracking-tight mb-3">Consorcio Hospital General Universitario de Valencia (CHGUV)</p>
                      <p className="flex items-start gap-2"><span className="text-slate-500 font-bold w-20 shrink-0">Servicio:</span> <span className="font-medium text-slate-300">Cirugía General y del Aparato Digestivo (SCGAD)</span></p>
                      <p className="flex items-start gap-2"><span className="text-slate-500 font-bold w-20 shrink-0">Sección:</span> <span className="font-medium text-slate-300">Cirugía Esofagogástrica, Bariátrica y Pared Abdominal Compleja (CEG)</span></p>
                    </div>
                    <div className="bg-slate-900/50 p-6 rounded-[2rem] border border-slate-800/80 self-start md:self-auto space-y-2">
                      <p className="flex items-center gap-2"><span className="text-slate-500 font-bold">Autores:</span> <span className="font-bold text-slate-200">Javier Tarrasa, Celia Báez, Alejandra De Andrés</span></p>
                      <p className="flex items-center gap-2"><span className="text-slate-500 font-bold">Versión:</span> <span className="font-bold text-indigo-400">1.0</span></p>
                    </div>
                  </div>
                  <div className="flex items-start md:items-center gap-3 text-xs md:text-sm text-slate-500 font-bold">
                    <iconify-icon icon="lucide:info" class="text-xl shrink-0 text-slate-600"></iconify-icon>
                    <p>Bibliografía: Elaboración propia basada en la última evidencia científica y guías de práctica clínica disponibles para cirugía digestiva y pared abdominal.</p>
                  </div>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
