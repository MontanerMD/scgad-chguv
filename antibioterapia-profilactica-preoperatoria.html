<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="description" content="Herramienta informativa de apoyo a la consulta del protocolo de profilaxis antibiótica quirúrgica. No sustituye el juicio clínico.">

<title>PROFILAXIS ANTIBIÓTICA QUIRÚRGICA</title>

<link rel="manifest" href='data:application/manifest+json,{"name":"Profilaxis Quirúrgica","short_name":"Profilaxis","start_url":".","display":"standalone","background_color":"%23f8fafc","theme_color":"%230f172a","icons":[]}'>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f8fafc;
  --surface:   #ffffff;
  --surface-2: #f1f5f9;
  --border:    #e2e8f0;
  --border-strong: #cbd5e1;
  --text:      #0f172a;
  --text-2:    #334155;
  --text-3:    #64748b;
  --primary:   #1e3a8a;
  --info-bg:   #eff6ff;
  --info-fg:   #1e40af;
  --info-bd:   #dbeafe;
  --warn-bg:   #fffbeb;
  --warn-fg:   #92400e;
  --warn-bd:   #fde68a;
  --alert-bg:  #fef2f2;
  --alert-fg:  #991b1b;
  --alert-bd:  #fecaca;
  --alert-strong: #dc2626;
  --organ-bg:  #fff7ed;
  --organ-fg:  #7c2d12;
  --organ-fg-2:#9a3412;
  --organ-bd:  #fed7aa;
  --organ-strong: #ea580c;
  --ok-bg:     #f0fdf4;
  --ok-fg:     #166534;
  --radius:    10px;
  --radius-sm: 6px;
  --tap:       44px;
}



html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  font-size: 16px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-size-adjust: 100%;
}
body { min-height: 100vh; min-height: 100dvh; padding-bottom: env(safe-area-inset-bottom); }

button {
  font: inherit; color: inherit; background: none; border: none;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
button:focus-visible, [role="button"]:focus-visible, summary:focus-visible {
  outline: 2px solid var(--primary); outline-offset: 2px;
}

.app { max-width: 720px; margin: 0 auto; padding: 0 16px 96px; }

header.app-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  margin: 0 -16px 12px;
  padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
}
.app-header h1 {
  font-size: 15px; font-weight: 600; letter-spacing: .01em;
  color: var(--text); display: flex; align-items: center; gap: 8px;
}
.app-header .tag {
  font-size: 11px; font-weight: 500; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .06em;
  margin-top: 2px; display: block;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); display: inline-block; }

.tabs {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px; margin-bottom: 16px;
}
.tab {
  min-height: var(--tap); padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600; color: var(--text-3);
  display: flex; align-items: center; justify-content: center;
  text-transform: uppercase; letter-spacing: .04em;
  transition: background .12s, color .12s;
}
.tab[aria-selected="true"] {
  background: var(--surface); color: var(--text);
  box-shadow: 0 1px 2px rgba(15,23,42,.06);
}

.disclaimer {
  background: var(--warn-bg); border: 1px solid var(--warn-bd);
  color: var(--warn-fg); border-radius: var(--radius);
  padding: 10px 12px; font-size: 13px; line-height: 1.4;
  margin-bottom: 16px; display: flex; gap: 8px;
}
.disclaimer strong { font-weight: 600; }
.disclaimer .icn { flex: 0 0 16px; width: 16px; height: 16px; margin-top: 2px; }

.view-title {
  font-size: 13px; font-weight: 500; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .05em;
  margin: 8px 4px 10px;
}
.search {
  display: block; width: 100%;
  min-height: var(--tap); padding: 10px 14px; margin-bottom: 12px;
  font-size: 15px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text);
}
.search:focus { outline: 2px solid var(--primary); outline-offset: -1px; border-color: transparent; }

.list { list-style: none; display: grid; gap: 8px; }
.surgery-btn {
  width: 100%; min-height: var(--tap); padding: 14px 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius);
  text-align: left; display: flex; align-items: center;
  justify-content: space-between; gap: 12px;
  font-size: 15px; font-weight: 500; color: var(--text);
  transition: border-color .12s, background .12s;
}
.surgery-btn:hover { border-color: var(--border-strong); }
.surgery-btn:active { background: var(--surface-2); }
.surgery-btn .arrow { color: var(--text-3); font-size: 18px; line-height: 1; }

.back {
  display: inline-flex; align-items: center; gap: 6px;
  min-height: var(--tap); padding: 8px 12px 8px 4px;
  margin: 4px 0 8px -4px;
  font-size: 14px; color: var(--text-2); font-weight: 500;
}
.back .arrow { font-size: 18px; line-height: 1; }

.detail h2, .guide h2, .biblio h2 {
  font-size: 20px; font-weight: 600; color: var(--text);
  margin-bottom: 4px; letter-spacing: -.01em;
}
.detail .sub, .guide .sub, .biblio .sub {
  font-size: 13px; color: var(--text-3); margin-bottom: 16px;
}


/* Algoritmo: pasos de preguntas */
.algo-step {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  animation: fade .18s ease-out;
}
.algo-step .step-q {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.35;
}
.algo-step .step-num {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
  margin-bottom: 6px;
}
.algo-opts {
  display: grid;
  gap: 8px;
}
.algo-opt {
  width: 100%;
  min-height: var(--tap);
  padding: 12px 16px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  text-align: left;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  transition: border-color .1s, background .1s;
}
.algo-opt:hover   { border-color: var(--primary); background: var(--info-bg); color: var(--info-fg); }
.algo-opt:active  { background: var(--info-bg); }
.algo-opt .opt-arrow { color: var(--text-3); font-size: 18px; }

/* Respuesta ya dada (breadcrumb) */
.algo-crumb {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  margin-bottom: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text-3);
  cursor: pointer;
}
.algo-crumb:hover { border-color: var(--border-strong); }
.algo-crumb .crumb-q  { font-weight: 600; color: var(--text-2); }
.algo-crumb .crumb-a  { color: var(--info-fg); font-weight: 500; }
.algo-crumb .crumb-edit { margin-left: auto; font-size: 11px; color: var(--text-3); }

/* Tabla resultado en Algoritmo */
.algo-result-wrap {
  margin-top: 16px;
  scroll-margin-top: 72px;
}
.algo-result-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-3);
  margin-bottom: 8px;
  display: block;
}

/* Tabla en vista Algoritmo: fila activa */
.guide-table tbody tr.row-active td {
  background: var(--info-bg) !important;
}

/* Enlace interno a fuentes */
.link-fuentes {
  color: var(--info-fg);
  font-weight: 500;
  text-decoration: underline;
}

.result {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 14px;
  /* Compensa la cabecera sticky al hacer scrollIntoView (pase de planta, móvil) */
  scroll-margin-top: 80px;
}
.result-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.result-section:last-child { border-bottom: none; }
.result-section h3 {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .07em; color: var(--text-3); margin-bottom: 8px;
}
.result-section .body { font-size: 15px; color: var(--text); line-height: 1.5; }
.result-section .body ul { list-style: none; display: grid; gap: 6px; }
.result-section .body li { padding-left: 14px; position: relative; }
.result-section .body li::before {
  content: ""; position: absolute; left: 2px; top: 9px;
  width: 4px; height: 4px; background: var(--text-3); border-radius: 50%;
}

.no-prophylaxis {
  background: var(--ok-bg); border-left: 3px solid #16a34a; color: var(--ok-fg);
}
.no-prophylaxis h3 { color: var(--ok-fg); }

.collapsible-block { border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.collapsible-block summary {
  display: flex; align-items: center; gap: 8px; list-style: none;
  cursor: pointer; padding: 11px 14px;
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  user-select: none; -webkit-user-select: none;
  min-height: var(--tap);
}
.collapsible-block summary::-webkit-details-marker { display: none; }
.collapsible-block summary::marker { display: none; }
.collapsible-block .chevron {
  margin-left: auto; flex: 0 0 16px; width: 16px; height: 16px;
  transition: transform .2s ease;
}
.collapsible-block[open] .chevron { transform: rotate(180deg); }
@media (prefers-reduced-motion: reduce) {
  .collapsible-block .chevron { transition: none; }
}
.collapsible-block .block-body { font-size: 14px; line-height: 1.45; padding: 0 14px 12px; }
.collapsible-block .block-body ul { list-style: none; display: grid; gap: 5px; }
.collapsible-block .block-body li { padding-left: 12px; position: relative; }
.collapsible-block .block-body li::before {
  content: ""; position: absolute; left: 0; top: 8px;
  width: 4px; height: 4px; border-radius: 50%;
}

.cb-danger { background: var(--alert-bg); border: 1px solid var(--alert-bd); border-left: 3px solid var(--alert-strong); }
.cb-danger summary, .cb-danger .block-body { color: var(--alert-fg); }
.cb-danger .block-body li::before { background: var(--alert-fg); }

.cb-organ { background: var(--organ-bg); border: 1px solid var(--organ-bd); border-left: 3px solid var(--organ-strong); }
.cb-organ summary { color: var(--organ-fg-2); }
.cb-organ .block-body { color: var(--organ-fg); }
.cb-organ .block-body li::before { background: var(--organ-fg-2); }

.cb-neutral { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--border-strong); }
.cb-neutral summary { color: var(--text-2); }
.cb-neutral .block-body { color: var(--text-2); }
.cb-neutral .block-body li::before { background: var(--text-3); }
.cb-fr-group { display: grid; gap: 10px; }
.cb-fr-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .05em; color: var(--text-3); margin-bottom: 4px;
}

.note {
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px;
  font-size: 13px; color: var(--text-2); line-height: 1.4;
  margin-bottom: 10px;
}

.scroll-hint {
  display: block; font-size: 11px; color: var(--text-3);
  margin: -8px 4px 14px; font-style: italic;
}
.table-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow-x: auto;
  -webkit-overflow-scrolling: touch; margin-bottom: 14px;
}
.guide-table { width: 100%; border-collapse: collapse; font-size: 12.5px; min-width: 620px; }
.guide-table caption {
  caption-side: top; text-align: left;
  padding: 12px 14px 10px;
  font-size: 14px; font-weight: 600; color: var(--text);
  background: var(--surface-2); border-bottom: 1px solid var(--border);
}
.guide-table thead th {
  position: sticky; top: 0; background: var(--surface-2);
  text-align: left; font-size: 10.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em; color: var(--text-3);
  padding: 9px 12px; border-bottom: 1px solid var(--border); white-space: nowrap;
}
.guide-table tbody td {
  padding: 10px 12px; vertical-align: top;
  border-bottom: 1px solid var(--border); color: var(--text); line-height: 1.4;
}
.guide-table tbody tr:last-child td { border-bottom: none; }
.guide-table tbody tr:nth-child(even) td { background: rgba(15, 23, 42, .015); }
@media (prefers-color-scheme: dark) {
  .guide-table tbody tr:nth-child(even) td { background: rgba(255, 255, 255, .025); }
}
.guide-table .col-scen { font-weight: 600; min-width: 150px; }
.guide-table .col-pauta, .guide-table .col-allergy { min-width: 220px; }
.guide-table .none { color: var(--text-3); font-style: italic; }
.guide-table .var {
  display: block; margin-top: 6px; padding-top: 6px;
  border-top: 1px dashed var(--border);
}
.guide-table .var-label {
  display: block; font-size: 10.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .05em;
  color: var(--text-3); margin-bottom: 2px;
}
.guide-table .opt { display: block; }

.biblio-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px;
}
.biblio-section h3 {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-3); margin-bottom: 8px;
}
.biblio-section p { font-size: 13.5px; color: var(--text-2); line-height: 1.5; }
.biblio-section p + p { margin-top: 6px; }
.biblio-section ul { list-style: none; display: grid; gap: 6px; }
.biblio-section li {
  font-size: 13px; color: var(--text-2); line-height: 1.45;
  padding-left: 12px; position: relative;
}
.biblio-section li::before {
  content: ""; position: absolute; left: 2px; top: 8px;
  width: 4px; height: 4px; background: var(--text-3); border-radius: 50%;
}
.biblio-link {
  display: inline-flex; align-items: center; gap: 6px;
  min-height: var(--tap); padding: 10px 12px;
  background: var(--info-bg); color: var(--info-fg);
  border: 1px solid var(--info-bd);
  border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  text-decoration: none; word-break: break-word;
}
.biblio-meta {
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  font-size: 12.5px; color: var(--text-2); line-height: 1.6;
}
.biblio-meta strong { color: var(--text); font-weight: 600; }

footer.app-footer { margin-top: 24px; }

@keyframes fade {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate { animation: fade .2s ease-out; }
@media (prefers-reduced-motion: reduce) { .animate { animation: none; } }
</style>
</head>
<body>

<div class="app">

  <header class="app-header">
    <h1>PROFILAXIS ANTIBIÓTICA QUIRÚRGICA</h1>
    <span class="tag">SCGAD · CHGUV · V1.0</span>
  </header>

  <nav class="tabs" role="tablist" aria-label="Navegación principal">
    <button class="tab" role="tab" id="tab-consulta" aria-selected="true" aria-controls="main" data-tab="list" type="button">Consulta</button>
    <button class="tab" role="tab" id="tab-guia" aria-selected="false" aria-controls="main" data-tab="guide" type="button">Guía</button>
    <button class="tab" role="tab" id="tab-biblio" aria-selected="false" aria-controls="main" data-tab="biblio" type="button">Fuentes</button>
  </nav>

  <aside class="disclaimer" role="note" id="disclaimer-banner" aria-label="Aviso legal">
    <svg class="icn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/>
      <line x1="12" y1="9" x2="12" y2="13"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <div>
      <strong>Herramienta informativa de apoyo clínico.</strong>
      No constituye un producto sanitario y no sustituye el juicio clínico del profesional.
      Verifique la información con las fuentes oficiales.
    </div>
  </aside>

  <main id="main" aria-live="polite"></main>

  <footer class="app-footer"></footer>

</div>

<script>
'use strict';

const FACTORES_RIESGO = {
  paciente: [
    "Edad > 70 años",
    "Tabaquismo activo",
    "Obesidad",
    "ASA III, IV, V",
    "Diabetes mellitus",
    "Embarazo",
    "Inmunosupresión",
    "Antecedentes de patología biliar",
    "Manipulación previa de vía biliar"
  ],
  intervencion: [
    "Drenaje biliar",
    "Colangiografía intraoperatoria",
    "Tiempo quirúrgico > 2 h",
    "Perforación de vesícula biliar",
    "Conversión a cirugía abierta",
    "Colocación de material protésico"
  ]
};

const PROTOCOLO = [
  { id: "piel", nombre: "Cirugía de piel y partes blandas", escenarios: [
    { id: "sin-fr", label: "Sin factores de riesgo", pill: "Sin FR", prophylaxis: null },
    { id: "con-fr", label: "Con factores de riesgo", pill: "Con FR", prophylaxis: {
      standard: ["Cefazolina 2 g IV"],
      special: [{ titulo: "Colonización por SARM (nosocomial)", contenido: ["Cefazolina 2 g IV + Vancomicina 15 mg/kg"] }],
      allergy: ["A) Clindamicina 600–900 mg", "B) Vancomicina 15 mg/kg"]
    }}
  ]},
  { id: "mama", nombre: "Cirugía de mama", escenarios: [
    { id: "benigna-sin-fr", label: "Patología benigna sin factores de riesgo", pill: "Benigna sin FR", prophylaxis: null },
    { id: "benigna-con-fr", label: "Patología benigna con factores de riesgo", pill: "Benigna con FR", prophylaxis: {
      standard: ["Cefazolina 2 g IV"],
      special: [{ titulo: "Colonización por SARM (nosocomial)", contenido: ["Cefazolina 2 g IV + Vancomicina 15 mg/kg"] }],
      allergy: ["A) Clindamicina 600–900 mg", "B) Vancomicina 15 mg/kg"]
    }},
    { id: "maligna", label: "Cirugía maligna o reconstructiva", pill: "Maligna / Reconstr.", prophylaxis: {
      standard: ["Cefazolina 2 g IV"],
      special: [{ titulo: "Colonización por SARM (nosocomial)", contenido: ["Cefazolina 2 g IV + Vancomicina 15 mg/kg"] }],
      allergy: ["A) Clindamicina 600–900 mg", "B) Vancomicina 15 mg/kg"]
    }}
  ]},
  { id: "hep-panc", nombre: "Cirugía hepática y pancreática", escenarios: [
    { id: "siempre", label: "Profilaxis siempre prevista en protocolo", pill: "Siempre", prophylaxis: {
      standard: ["Cefazolina 2 g IV"],
      special: [
        { titulo: "Con factores de riesgo", contenido: ["Cefuroxima 1,5 g + Metronidazol 15 mg/kg"] },
        { titulo: "Cepa productora de BLEE", contenido: ["Imipenem"] }
      ],
      allergy: ["A) Vancomicina 15 mg/kg + Gentamicina 5 mg/kg", "B) Clindamicina 600–900 mg + Gentamicina 5 mg/kg"]
    }}
  ]},
  { id: "biliar", nombre: "Cirugía de vía biliar", escenarios: [
    { id: "colelap-sin-fr", label: "Colecistectomía laparoscópica sin factores de riesgo", pill: "Colelap sin FR", prophylaxis: null },
    { id: "resto", label: "Resto de procedimientos biliares", pill: "Resto", prophylaxis: {
      standard: ["Bajo riesgo: Cefazolina 2 g IV"],
      special: [
        { titulo: "Alto riesgo (con factores de riesgo)", contenido: ["Cefuroxima 1,5 g + Metronidazol 15 mg/kg"] },
        { titulo: "Cepa productora de BLEE", contenido: ["Imipenem"] }
      ],
      allergy: ["A) Vancomicina 15 mg/kg + Gentamicina 5 mg/kg", "B) Clindamicina 600–900 mg + Gentamicina 5 mg/kg"]
    }}
  ]},
  { id: "esof-gast", nombre: "Cirugía esofágica, gástrica y duodenal", escenarios: [
    { id: "sin-rotura", label: "Sin rotura de mucosa y sin factores de riesgo", pill: "Sin rotura · Sin FR", prophylaxis: null },
    { id: "resto", label: "Resto de procedimientos", pill: "Resto", prophylaxis: {
      standard: ["Bajo riesgo: Cefazolina 2 g IV"],
      special: [
        { titulo: "Alto riesgo (con factores de riesgo)", contenido: ["Cefuroxima 1,5 g + Metronidazol 15 mg/kg"] },

const state = { view: "list", surgeryId: null, scenarioId: null, query: "" };

const main = document.getElementById("main");
const banner = document.getElementById("disclaimer-banner");

// Delegación global: captura clics en el enlace de fuentes dondequiera que aparezca
main.addEventListener("click", e => {
  const link = e.target.closest("#link-fuentes");
  if (!link) return;
  e.preventDefault();
  setView({ view: "biblio", surgeryId: null, scenarioId: null });
});

function setView(next) {
  Object.assign(state, next);
  render();
  main.focus?.();
  window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
}

function bindTabs() {
  document.querySelectorAll(".tab[data-tab]").forEach(tab => {
    tab.addEventListener("click", () => {
      const t = tab.getAttribute("data-tab");
      if (t === "guide")       setView({ view: "guide", surgeryId: null, scenarioId: null });
      else if (t === "biblio") setView({ view: "biblio", surgeryId: null, scenarioId: null });
      else                     setView({ view: "list", surgeryId: null, scenarioId: null });
    });
  });
}

function syncTabs() {
  const v = state.view;
  document.getElementById("tab-consulta").setAttribute("aria-selected", String(v === "list" || v === "detail"));
  document.getElementById("tab-guia").setAttribute("aria-selected", String(v === "guide"));
  document.getElementById("tab-biblio").setAttribute("aria-selected", String(v === "biblio"));
  banner.style.display = v === "biblio" ? "none" : "";
}

function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
const escapeAttr = escapeHtml;

function render() {
  syncTabs();
  if (state.view === "guide")  return renderGuide();
  if (state.view === "biblio") return renderBiblio();
  if (state.view === "detail") return renderDetail();
  return renderList();
}

function renderList() {
  main.innerHTML = `
    <div class="animate">
      <p class="view-title">Seleccione el tipo de cirugía</p>
      <input class="search" type="search" inputmode="search" autocomplete="off"
             placeholder="Buscar tipo de cirugía…"
             aria-label="Buscar tipo de cirugía"
             value="${escapeAttr(state.query)}">
      <ul class="list" role="list" id="surgery-list"></ul>
    </div>`;
  main.querySelector(".search").addEventListener("input", e => {
    state.query = e.target.value;
    paintSurgeryList();
  });
  paintSurgeryList();
}

function paintSurgeryList() {
  const q = state.query.trim().toLowerCase();
  const items = PROTOCOLO.filter(s => !q || s.nombre.toLowerCase().includes(q));
  const list = document.getElementById("surgery-list");
  list.innerHTML = items.length
    ? items.map(s => `
        <li>
          <button class="surgery-btn" data-surgery="${s.id}" type="button">
            <span>${escapeHtml(s.nombre)}</span>
            <span class="arrow" aria-hidden="true">›</span>
          </button>
        </li>`).join("")
    : `<li><div class="note">No se encontraron tipos de cirugía con ese término.</div></li>`;

  list.querySelectorAll("[data-surgery]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-surgery");
      algoReset();
      setView({ view: "detail", surgeryId: id, scenarioId: null });
    });
  });
}

/* ============================================================
   ÁRBOLES DE DECISIÓN POR TIPO DE CIRUGÍA
   Cada nodo: { id, pregunta, opciones: [{ label, next|scenarioId }] }
   next   → id del siguiente nodo (pregunta)
   result → id/s de escenario/s a resaltar en la tabla (array)
   ============================================================ */
const ALGORITMO = {

  piel: [
    { id: "q1", showFR: true, pregunta: "¿El paciente presenta factores de riesgo?",
      opciones: [
        { label: "No",  result: ["sin-fr"] },

      ]
    },

      opciones: [
        { label: "No",  result: ["benigna-sin-fr"] },

    }
  ],

  biliar: [

    },

      ]
    }
  ],

  "esof-gast": [

      opciones: [
        { label: "No (sin rotura de mucosa y sin FR)",  result: ["sin-rotura"] },
        { label: "Sí (con rotura o con FR)",            result: ["resto"] }
      ]

  bariatrica: [

      opciones: [

/* Estado del algoritmo:
   algoPath = [{ nodeId, opcionIndex }]  — respuestas dadas
   algoResult = [scenarioId, …] | null   — ids de escenarios resaltados */
function algoReset() {
  state.algoPath   = [];
  state.algoResult = null;
}

function renderDetail() {
  const surgery = PROTOCOLO.find(s => s.id === state.surgeryId);
  if (!surgery) { setView({ view: "list" }); return; }

  if (!state.algoPath)   state.algoPath   = [];
  if (!('algoResult' in state)) state.algoResult = null;

  const tree = ALGORITMO[state.surgeryId] || [];

  // Determinar nodo actual recorriendo el path
  let currentNodeId = tree.length ? tree[0].id : null;
  for (const step of state.algoPath) {
    const node = tree.find(n => n.id === step.nodeId);
    if (!node) break;
    const opt = node.opciones[step.opcionIndex];
    if (!opt) break;
    if (opt.next) { currentNodeId = opt.next; }
    else { currentNodeId = null; break; }  // resultado alcanzado
  }
  const currentNode = currentNodeId ? tree.find(n => n.id === currentNodeId) : null;

  main.innerHTML = `
    <div class="animate detail">
      <button class="back" id="btn-back" type="button">
        <span class="arrow" aria-hidden="true">‹</span><span>Volver</span>
      </button>
      <h2>${escapeHtml(surgery.nombre)}</h2>

      <div id="algo-body"></div>
    </div>`;

  document.getElementById("btn-back").addEventListener("click", () => {
    algoReset();
    setView({ view: "list", surgeryId: null, scenarioId: null });
  });

  paintAlgo(surgery, tree);
}

function paintAlgo(surgery, tree) {
  const body = document.getElementById("algo-body");
  if (!body) return;

  // Reconstruir estado desde el path
  let currentNodeId = tree.length ? tree[0].id : null;
  let resultIds = null;
  for (const step of state.algoPath) {
    const node = tree.find(n => n.id === step.nodeId);
    if (!node) break;
    const opt = node.opciones[step.opcionIndex];
    if (!opt) break;
    if (opt.result) { resultIds = opt.result; currentNodeId = null; break; }
    if (opt.next)   { currentNodeId = opt.next; }
  }

  let html = "";

  // Breadcrumbs: respuestas ya dadas
  state.algoPath.forEach((step, idx) => {
    const node = tree.find(n => n.id === step.nodeId);
    if (!node) return;
    const opt = node.opciones[step.opcionIndex];
    html += `
      <div class="algo-crumb" data-crumb="${idx}" role="button" tabindex="0"
           aria-label="Editar respuesta: ${escapeHtml(node.pregunta)}">
        <span>
          <span class="crumb-q">${escapeHtml(node.pregunta)}</span>
          &nbsp;→&nbsp;
          <span class="crumb-a">${escapeHtml(opt.label)}</span>
        </span>
        <span class="crumb-edit">Cambiar</span>
      </div>`;
  });

  // Pregunta actual
  const currentNode = currentNodeId ? tree.find(n => n.id === currentNodeId) : null;
  if (currentNode) {
    const stepNum = state.algoPath.length + 1;
    html += `
      <div class="algo-step">
        <span class="step-num">Paso ${stepNum}</span>
        <div class="step-q">${escapeHtml(currentNode.pregunta)}</div>
        <div class="algo-opts">
          ${currentNode.opciones.map((opt, i) => `
            <button class="algo-opt" data-node="${currentNode.id}" data-opt="${i}" type="button">
              <span>${escapeHtml(opt.label)}</span>
              <span class="opt-arrow" aria-hidden="true">›</span>
            </button>`).join("")}
        </div>
      </div>`;
    if (currentNode.showFR) html += renderRiskFactorsBlock();
  }

  // Tabla resultado (siempre al final, resaltando las filas correspondientes)
  if (resultIds || (!currentNode && state.algoPath.length > 0)) {
    const activeIds = resultIds || state.algoResult || [];
    html += `
      <div class="algo-result-wrap" id="algo-result">
        <span class="algo-result-label">Información del protocolo para el escenario seleccionado</span>
        <div class="table-wrap">
          <table class="guide-table">
            <thead>
              <tr>
                <th class="col-scen" scope="col">Escenario clínico</th>
                <th class="col-pauta" scope="col">Pauta del protocolo</th>
                <th class="col-allergy" scope="col">Alérgicos a betalactámicos</th>
              </tr>
            </thead>
            <tbody>
              ${surgery.escenarios.map(e => renderAlgoRow(e, activeIds)).join("")}
            </tbody>
          </table>
        </div>
        ${renderRiskFactorsBlock()}
        ${renderCriticalBlock()}
        ${renderAdjustBlock()}
        ${renderClinicalNote()}
      </div>`;
    state.algoResult = activeIds;
  }

  body.innerHTML = html;

  // Listeners: opciones del paso actual
  body.querySelectorAll(".algo-opt[data-node]").forEach(btn => {
    btn.addEventListener("click", () => {
      const nodeId  = btn.getAttribute("data-node");
      const optIdx  = parseInt(btn.getAttribute("data-opt"), 10);
      state.algoPath.push({ nodeId, opcionIndex: optIdx });
      paintAlgo(surgery, tree);
      // Scroll al resultado si ya está disponible
      requestAnimationFrame(() => {
        const res = document.getElementById("algo-result");
        if (res) res.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    });
  });

  // Listeners: breadcrumbs (retroceder a ese paso)
  body.querySelectorAll(".algo-crumb[data-crumb]").forEach(el => {
    const handler = () => {
      const idx = parseInt(el.getAttribute("data-crumb"), 10);
      state.algoPath = state.algoPath.slice(0, idx);
      state.algoResult = null;
      paintAlgo(surgery, tree);
    };
    el.addEventListener("click", handler);
    el.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handler(); } });
  });
}

function renderAlgoRow(e, activeIds) {
  const isActive = activeIds.includes(e.id);
  const activeClass = isActive ? " row-active" : "";
  if (e.prophylaxis === null) {
    return `
      <tr class="${activeClass}" data-scenario="${e.id}">
        <td class="col-scen">${escapeHtml(e.label)}</td>
        <td class="col-pauta none">Sin profilaxis prevista.</td>
        <td class="col-allergy none">Sin profilaxis prevista.</td>
      </tr>`;
  }
  const p = e.prophylaxis;
  const opts = arr => arr.map(t => `<span class="opt">${escapeHtml(t)}</span>`).join("");
  const variants = (p.special || []).map(s => `
    <span class="var">
      <span class="var-label">${escapeHtml(s.titulo)}</span>
      ${opts(s.contenido)}
    </span>`).join("");
  return `
    <tr class="${activeClass}" data-scenario="${e.id}">
      <td class="col-scen">${escapeHtml(e.label)}</td>
      <td class="col-pauta">${opts(p.standard)}${variants}</td>
      <td class="col-allergy">${opts(p.allergy)}</td>
    </tr>`;
}

function renderScenario(sc) {
  if (sc.prophylaxis === null) {
    return `
      <div class="result animate" role="region" aria-label="Información del protocolo">
        <div class="result-section no-prophylaxis">
          <h3>Pauta del protocolo</h3>
          <div class="body"><strong>Sin profilaxis antibiótica prevista.</strong></div>
        </div>
      </div>
      ${renderCriticalBlock()}
      ${renderAdjustBlock()}
      ${renderClinicalNote()}`;
  }
  const p = sc.prophylaxis;
  const list = items => `<ul>${items.map(t => `<li>${escapeHtml(t)}</li>`).join("")}</ul>`;
  return `
    <div class="result animate" role="region" aria-label="Información del protocolo">
      <div class="result-section">
        <h3>Pauta estándar del protocolo</h3>
        <div class="body">${list(p.standard)}</div>
      </div>
      ${(p.special || []).map(s => `
        <div class="result-section">
          <h3>${escapeHtml(s.titulo)}</h3>
          <div class="body">${list(s.contenido)}</div>
        </div>`).join("")}
      <div class="result-section">
        <h3>Pauta del protocolo en alérgicos a betalactámicos</h3>
        <div class="body">${list(p.allergy)}</div>
      </div>
    </div>
    ${renderCriticalBlock()}
    ${renderAdjustBlock()}
    ${renderClinicalNote()}`;
}

  return `
    <details class="collapsible-block cb-neutral">
      <summary>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

        Factores de riesgo (FR) · referencia
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </summary>
      <div class="block-body cb-fr-group">
        <div>
          <div class="cb-fr-label">Dependientes del paciente</div>
          <ul>${FACTORES_RIESGO.paciente.map(f => `<li>${escapeHtml(f)}</li>`).join("")}</ul>
        </div>
        <div>
          <div class="cb-fr-label">Dependientes de la intervención</div>
          <ul>${FACTORES_RIESGO.intervencion.map(f => `<li>${escapeHtml(f)}</li>`).join("")}</ul>

      </div>
    </details>`;
}

function renderClinicalNote() {
  return `
    <div class="note" role="note">
      Esta consulta muestra la información del protocolo. La indicación final, la dosis adaptada al paciente
      y el resto de decisiones terapéuticas corresponden al facultativo responsable.
      <br><br>
      Consulta el protocolo original y las referencias bibliográficas con las que ha sido elaborado <a href="#" id="link-fuentes" class="link-fuentes">aquí</a>.
    </div>`;
}

function renderGuide() {
  main.innerHTML = `
    <div class="animate guide">
      <h2>Guía completa</h2>
      <p class="sub">Volcado íntegro del protocolo. Información de consulta — la indicación final corresponde al facultativo.</p>
      <span class="scroll-hint">Deslice horizontalmente la tabla en pantallas pequeñas.</span>

      ${PROTOCOLO.map(s => `
        <div class="table-wrap">
          <table class="guide-table">
            <caption>${escapeHtml(s.nombre)}</caption>
            <thead>
              <tr>
                <th class="col-scen" scope="col">Escenario clínico</th>
                <th class="col-pauta" scope="col">Pauta del protocolo</th>
                <th class="col-allergy" scope="col">Alérgicos a betalactámicos</th>
              </tr>
            </thead>
            <tbody>${s.escenarios.map(renderGuideRow).join("")}</tbody>
          </table>
        </div>`).join("")}

      ${renderRiskFactorsBlock()}
      ${renderCriticalBlock()}
      ${renderAdjustBlock()}
      ${renderClinicalNote()}
    </div>`;
}

function renderGuideRow(e) {
  if (e.prophylaxis === null) {
    return `
      <tr>
        <td class="col-scen">${escapeHtml(e.label)}</td>
        <td class="col-pauta none">Sin profilaxis prevista.</td>
        <td class="col-allergy none">Sin profilaxis prevista.</td>
      </tr>`;
  }
  const p = e.prophylaxis;
  const opts = arr => arr.map(t => `<span class="opt">${escapeHtml(t)}</span>`).join("");
  const variants = (p.special || []).map(s => `
    <span class="var">
      <span class="var-label">${escapeHtml(s.titulo)}</span>
      ${opts(s.contenido)}
    </span>`).join("");
  return `
    <tr>
      <td class="col-scen">${escapeHtml(e.label)}</td>
      <td class="col-pauta">${opts(p.standard)}${variants}</td>
      <td class="col-allergy">${opts(p.allergy)}</td>
    </tr>`;
}
