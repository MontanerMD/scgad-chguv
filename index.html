<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eHealth Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <span class="text-white font-bold text-xs">H</span>
                </div>
                <span class="font-bold tracking-tight text-slate-800 text-xl">eHealth</span>
            </div>
            <span class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full font-bold uppercase tracking-widest">Live Sync</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <header class="mb-10 text-center md:text-left">
            <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Panel de Control Clínico</h2>
            <p class="text-slate-500 mt-2 text-lg">Seleccione el algoritmo o calculadora quirúrgica necesaria.</p>
        </header>

        <div id="app-list" class="grid gap-6 md:grid-cols-2">
            <div class="h-32 bg-slate-200 animate-pulse rounded-2xl"></div>
            <div class="h-32 bg-slate-200 animate-pulse rounded-2xl"></div>
        </div>
    </main>

    <script>
        const USER = 'MontanerMD'; 
        const REPO = 'eHealth';

        async function fetchApps() {
            const list = document.getElementById('app-list');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/`);
                const files = await response.json();

                list.innerHTML = '';

                const apps = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');

                if (apps.length === 0) {
                    list.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400">No se han detectado herramientas .html</div>`;
                    return;
                }

                apps.forEach(app => {
                    const name = app.name
                        .replace('.html', '')
                        .replace(/-/g, ' ')
                        .replace(/\b\w/g, l => l.toUpperCase());

                    const card = document.createElement('a');
                    card.href = app.name;
                    card.className = "group glass-card p-6 rounded-2xl shadow-sm hover:shadow-xl hover:shadow-blue-500/10 hover:border-blue-400/50 hover:-translate-y-1 transition-all duration-300 relative overflow-hidden";
                    
                    card.innerHTML = `
                        <div class="relative z-10">
                            <div class="w-10 h-10 bg-slate-100 rounded-xl mb-4 flex items-center justify-center group-hover:bg-blue-600 transition-colors">
                                <svg class="w-5 h-5 text-slate-500 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                                </svg>
                            </div>
                            <h3 class="font-bold text-slate-800 text-lg leading-tight mb-1">${name}</h3>
                            <div class="flex items-center gap-2">
                                <span class="text-[11px] font-bold text-blue-600 uppercase tracking-tighter">Acceder herramienta</span>
                                <svg class="w-3 h-3 text-blue-600 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7l5 5m0 0l-5 5m5-5H6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </div>
                        </div>
                        <div class="absolute -right-4 -bottom-4 w-24 h-24 bg-blue-500/5 rounded-full group-hover:bg-blue-500/10 transition-colors"></div>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                list.innerHTML = `<div class="col-span-full text-red-500 font-medium">Error conectando con el repositorio de GitHub.</div>`;
            }
        }

        fetchApps();
    </script>
</body>
</html>
